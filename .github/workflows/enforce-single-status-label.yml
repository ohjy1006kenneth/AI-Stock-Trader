name: Enforce Single Status Label

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]

jobs:
  enforce_single_status_label:
    if: startsWith(github.event.label.name, 'status:')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Remove old status labels from issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const current = context.payload.label.name;
            const labels = context.payload.issue.labels.map(l => l.name);
            const stale = labels.filter(l => l.startsWith('status:') && l !== current);
            for (const label of stale) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                name: label
              });
            }

      - name: Remove old status labels from pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const current = context.payload.label.name;
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const stale = labels.filter(l => l.startsWith('status:') && l !== current);
            for (const label of stale) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: label
              });
            }
